<style>
:root{
  --ink:#051941;          /* brand navy */
  --ink-2:#0a2455;
  --cyan:#00B2FC;         /* brand cyan */
  --cyan-deep:#0090d6;
  --white:#ffffff;
  --surface:#F2F6FC;      /* cool off-white */
  --surface-2:#E8F0FA;
  --slate:#51618A;        /* secondary text */
  --line:#E1E9F4;
  --radius:18px;
  --radius-sm:12px;
  --maxw:1180px;
  --shadow:0 18px 50px -18px rgba(5,25,65,.20);
  --shadow-sm:0 8px 24px -12px rgba(5,25,65,.18);
  --font-display:'Sora',system-ui,sans-serif;
  --font-body:'Plus Jakarta Sans',system-ui,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  font-family:var(--font-body);
  color:var(--ink);
  background:var(--white);
  line-height:1.6;
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}
h1,h2,h3,h4{font-family:var(--font-display);line-height:1.1;letter-spacing:-.02em;font-weight:700}
a{color:inherit;text-decoration:none}
img{max-width:100%;display:block}
.wrap{max-width:var(--maxw);margin:0 auto;padding:0 24px}
.eyebrow{
  font-family:var(--font-display);font-weight:600;font-size:.78rem;letter-spacing:.16em;
  text-transform:uppercase;color:var(--cyan-deep);display:inline-flex;align-items:center;gap:.55rem;
}
.eyebrow::before{content:"";width:24px;height:2px;background:var(--cyan);border-radius:2px}

/* ---------- buttons ---------- */
.btn{
  display:inline-flex;align-items:center;gap:.5rem;font-family:var(--font-display);font-weight:600;
  font-size:.98rem;padding:.85rem 1.5rem;border-radius:999px;cursor:pointer;border:0;
  transition:transform .18s ease,box-shadow .18s ease,background .18s ease;white-space:nowrap;
}
.btn-primary{background:var(--cyan);color:var(--ink);box-shadow:0 10px 26px -8px rgba(0,178,252,.6)}
.btn-primary:hover{transform:translateY(-2px);background:#1cbcff;box-shadow:0 16px 32px -8px rgba(0,178,252,.7)}
.btn-ghost{background:transparent;color:var(--ink);border:1.5px solid var(--line)}
.btn-ghost:hover{border-color:var(--cyan);color:var(--cyan-deep);transform:translateY(-2px)}
.btn-light{background:var(--white);color:var(--ink)}
.btn-light:hover{transform:translateY(-2px);box-shadow:var(--shadow-sm)}
.btn-lg{padding:1.05rem 1.9rem;font-size:1.05rem}

/* ---------- header ---------- */
header{
  position:sticky;top:0;z-index:50;background:rgba(255,255,255,.82);
  backdrop-filter:blur(14px);border-bottom:1px solid transparent;transition:border-color .3s,box-shadow .3s;
}
header.scrolled{border-color:var(--line);box-shadow:0 6px 20px -16px rgba(5,25,65,.4)}
.nav{display:flex;align-items:center;justify-content:space-between;height:76px;gap:2rem}
.nav img.logo{height:clamp(18px,5.2vw,30px);width:auto;max-width:62vw;image-rendering:-webkit-optimize-contrast}
.nav-links{display:flex;align-items:center;gap:2rem;font-weight:500;font-size:.96rem;color:var(--slate)}
.nav-links a{transition:color .15s}
.nav-links a:hover{color:var(--ink)}
.nav-cta{display:flex;align-items:center;gap:1rem}
.menu-btn{display:none;background:none;border:0;cursor:pointer;color:var(--ink)}

/* ---------- hero ---------- */
.hero{position:relative;padding:84px 0 96px;overflow:hidden}
.hero-bg{position:absolute;inset:0;z-index:0;pointer-events:none}
.hero-bg img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.hero-bg .hero-shade{position:absolute;inset:0;background:linear-gradient(90deg,rgba(5,25,65,.86) 0%,rgba(5,25,65,.72) 34%,rgba(5,25,65,.42) 62%,rgba(5,25,65,.12) 100%)}
.hero-grid{position:relative;z-index:1;display:grid;grid-template-columns:1.05fr .95fr;gap:64px;align-items:center}
.hero .eyebrow{color:#fff}
.eyebrow-hero{text-transform:none;letter-spacing:.01em;font-size:.84rem;font-weight:600}
.hero-copy h1{font-size:clamp(2.4rem,5vw,3.65rem);font-weight:800;color:#fff}
.hero-copy h1 .accent{color:var(--cyan)}
.hero-copy p.lead{font-size:1.18rem;color:rgba(255,255,255,.92);margin:1.4rem 0 2rem;max-width:34ch}
.hero-copy .hero-trust{color:rgba(255,255,255,.86)}
.hero-copy .hero-trust b{color:#fff}
.hero-copy .hero-feat{color:rgba(255,255,255,.92)}
.hero-actions{display:flex;gap:.9rem;flex-wrap:wrap}
.hero-trust{display:flex;align-items:center;gap:1.4rem;margin-top:2.4rem;color:var(--slate);font-size:.9rem;flex-wrap:wrap}
.hero-trust .stars{color:var(--cyan);letter-spacing:2px}
.hero-trust b{color:var(--ink);font-family:var(--font-display)}

/* control card (hero visual) */
.control{
  background:var(--white);border:1px solid var(--line);border-radius:24px;padding:22px;
  box-shadow:var(--shadow);position:relative;
}
.control::before{
  content:"";position:absolute;inset:0;border-radius:24px;padding:1px;
  background:linear-gradient(140deg,rgba(0,178,252,.5),transparent 40%);
  -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);
  -webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none;
}
.control-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.control-head .room{font-family:var(--font-display);font-weight:700;font-size:1.15rem}
.control-head .room small{display:block;font-family:var(--font-body);font-weight:500;color:var(--slate);font-size:.8rem}
.live{display:inline-flex;align-items:center;gap:.45rem;font-size:.8rem;font-weight:600;color:var(--cyan-deep);background:var(--surface-2);padding:.3rem .7rem;border-radius:999px}
.live .dot{width:8px;height:8px;border-radius:50%;background:var(--cyan);box-shadow:0 0 0 0 rgba(0,178,252,.6);animation:pulse 2.4s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(0,178,252,.55)}70%{box-shadow:0 0 0 8px rgba(0,178,252,0)}100%{box-shadow:0 0 0 0 rgba(0,178,252,0)}}
.tiles{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.tile{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:14px 15px;transition:transform .2s}
.tile:hover{transform:translateY(-3px)}
.tile .t-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;color:var(--slate)}
.tile .t-top svg{width:20px;height:20px}
.tile .t-name{font-weight:600;font-size:.9rem}
.tile .t-val{font-family:var(--font-display);font-weight:700;font-size:1.4rem;letter-spacing:-.03em}
.tile .t-sub{font-size:.78rem;color:var(--slate)}
.switch{width:42px;height:24px;border-radius:999px;background:var(--cyan);position:relative;flex-shrink:0}
.switch.off{background:#cdd8ea}
.switch::after{content:"";position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;background:#fff;transition:left .2s}
.switch.on::after{left:21px}
.scene{margin-top:12px;display:flex;align-items:center;justify-content:space-between;background:var(--ink);color:#fff;border-radius:14px;padding:13px 16px}
.scene .s-name{font-family:var(--font-display);font-weight:600;font-size:.95rem;display:flex;align-items:center;gap:.6rem}
.scene .s-name svg{width:18px;height:18px;color:var(--cyan)}
.scene .go{font-size:.8rem;color:var(--cyan);font-weight:600}

/* ---------- logos strip ---------- */
.strip{border-top:1px solid var(--line);border-bottom:1px solid var(--line);background:var(--surface)}
.strip-inner{display:flex;align-items:center;gap:14px 40px;padding:26px 0;flex-wrap:wrap;justify-content:center}
.strip-inner span.lbl{font-size:.82rem;color:var(--slate);font-weight:500;margin-right:8px}
.strip-inner .brand{font-family:var(--font-display);font-weight:700;color:var(--ink);opacity:.62;font-size:1.05rem;letter-spacing:-.01em}

/* ---------- generic section ---------- */
.section{padding:96px 0}
.section-head{max-width:620px;margin-bottom:54px}
.section-head.center{margin-left:auto;margin-right:auto;text-align:center}
.section-head h2{font-size:clamp(1.9rem,3.6vw,2.6rem);margin:1rem 0 .9rem}
.section-head p{color:var(--slate);font-size:1.08rem}
.alt{background:var(--surface)}

/* solutions grid */
.sol-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
.sol{background:var(--white);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;transition:transform .22s,box-shadow .22s,border-color .22s}
.sol:hover{transform:translateY(-5px);box-shadow:var(--shadow);border-color:transparent}
.sol-img{height:170px;overflow:hidden}
.sol-img img{width:100%;height:100%;object-fit:cover;transition:transform .35s ease}
.sol:hover .sol-img img{transform:scale(1.05)}
.sol-txt{padding:22px 24px 26px}
.sol h3{font-size:1.18rem;margin-bottom:.5rem}
.sol p{color:var(--slate);font-size:.96rem}

/* our work: photos of our own office and showroom build out */
.work-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
.work-fig{margin:0;border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;background:var(--surface)}
.work-fig img{display:block;width:100%;height:100%;object-fit:cover;aspect-ratio:3/2}
.work-fig.lead{grid-column:1 / -1}
/* lead keeps its true ratio so the shades and display are not cropped out */
.work-fig.lead img{height:auto;aspect-ratio:1600/1067}

/* how it works */
.steps{display:grid;grid-template-columns:repeat(3,1fr);gap:0;position:relative}
.thread{position:absolute;top:34px;left:14%;right:14%;height:2px;z-index:0}
.thread svg{width:100%;height:60px;overflow:visible}
.step{position:relative;z-index:1;text-align:center;padding:0 22px}
.step .num{width:68px;height:68px;border-radius:50%;background:var(--white);border:2px solid var(--cyan);color:var(--ink);
  font-family:var(--font-display);font-weight:700;font-size:1.5rem;display:grid;place-items:center;margin:0 auto 22px;box-shadow:var(--shadow-sm)}
.step h3{font-size:1.2rem;margin-bottom:.5rem}
.step p{color:var(--slate);font-size:.97rem;max-width:30ch;margin:0 auto}

/* packages */
.pkgs{display:grid;grid-template-columns:repeat(3,1fr);gap:22px;align-items:start}
.pkg{background:var(--white);border:1px solid var(--line);border-radius:var(--radius);padding:32px 28px;position:relative;transition:transform .2s}
.pkg:hover{transform:translateY(-4px)}
.pkg.feature{background:var(--ink);color:#fff;border-color:var(--ink);box-shadow:var(--shadow)}
.pkg .tag{position:absolute;top:-13px;left:50%;transform:translateX(-50%);background:var(--cyan);color:var(--ink);
  font-family:var(--font-display);font-weight:700;font-size:.72rem;letter-spacing:.08em;text-transform:uppercase;padding:.35rem .9rem;border-radius:999px}
.pkg .p-name{font-family:var(--font-display);font-weight:600;font-size:1.05rem;color:var(--cyan-deep)}
.pkg.feature .p-name{color:var(--cyan)}
.pkg .price{font-family:var(--font-display);font-weight:800;font-size:2.5rem;letter-spacing:-.03em;margin:.5rem 0 .2rem}
.pkg .price small{font-size:.95rem;font-weight:500;color:var(--slate)}
.pkg.feature .price small{color:#9fb4d8}
.pkg .p-desc{font-size:.92rem;color:var(--slate);margin-bottom:20px;min-height:42px}
.pkg.feature .p-desc{color:#b9c8e6}
.pkg ul{list-style:none;margin:0 0 26px;display:flex;flex-direction:column;gap:11px}
.pkg li{display:flex;gap:.65rem;align-items:flex-start;font-size:.94rem}
.pkg li svg{width:18px;height:18px;color:var(--cyan-deep);flex-shrink:0;margin-top:3px}
.pkg.feature li svg{color:var(--cyan)}
.pkg .btn{width:100%;justify-content:center}

/* why us */
.why-grid{display:grid;grid-template-columns:1.1fr 1fr;gap:60px;align-items:center}
.why-list{display:flex;flex-direction:column;gap:22px}
.why-item{display:flex;gap:18px}
.why-item .wic{width:48px;height:48px;flex-shrink:0;border-radius:13px;background:var(--cyan);color:var(--ink);display:grid;place-items:center}
.why-item .wic svg{width:24px;height:24px}
.why-item h3{font-size:1.12rem;margin-bottom:.25rem}
.why-item p{color:var(--slate);font-size:.96rem}
.why-card{background:var(--ink);border-radius:24px;padding:42px;color:#fff;position:relative;overflow:hidden}
.why-card .stat{font-family:var(--font-display);font-weight:800;font-size:3.4rem;color:var(--cyan);letter-spacing:-.03em;line-height:1}
.why-card .stat-l{color:#b9c8e6;margin-bottom:30px}
.why-card .quote{font-size:1.18rem;font-weight:500;line-height:1.5;font-family:var(--font-display)}
.why-card .by{margin-top:18px;color:#9fb4d8;font-size:.92rem}
.why-card .inf{position:absolute;right:-30px;bottom:-30px;width:180px;opacity:.14}

/* testimonials */
.tgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
.tcard{background:var(--white);border:1px solid var(--line);border-radius:var(--radius);padding:28px}
.tcard .stars{color:var(--cyan);letter-spacing:2px;margin-bottom:14px}
.tcard p{font-size:1rem;margin-bottom:18px}
.tcard .who{font-family:var(--font-display);font-weight:600;font-size:.95rem}
.tcard .who small{display:block;color:var(--slate);font-weight:500;font-family:var(--font-body)}

/* faq */
.faq{max-width:780px;margin:0 auto}
.qa{border-bottom:1px solid var(--line)}
.qa button{width:100%;background:none;border:0;cursor:pointer;text-align:left;padding:22px 0;
  display:flex;justify-content:space-between;align-items:center;gap:1rem;font-family:var(--font-display);font-weight:600;font-size:1.08rem;color:var(--ink)}
.qa .ico{flex-shrink:0;width:24px;height:24px;color:var(--cyan-deep);transition:transform .25s}
.qa.open .ico{transform:rotate(45deg)}
.qa .ans{max-height:0;overflow:hidden;transition:max-height .3s ease}
.qa .ans p{padding:0 0 22px;color:var(--slate)}

/* cta band */
.cta{background:linear-gradient(135deg,var(--ink),var(--ink-2));color:#fff;border-radius:28px;padding:64px 48px;text-align:center;position:relative;overflow:hidden}
.cta h2{font-size:clamp(1.9rem,4vw,2.7rem);max-width:18ch;margin:0 auto 1rem}
.cta p{color:#b9c8e6;font-size:1.1rem;max-width:46ch;margin:0 auto 2rem}
.cta .inf{position:absolute;width:340px;opacity:.1;top:-80px;left:-60px}
.cta-actions{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;position:relative;z-index:1}

/* footer */
footer{background:var(--ink);color:#b9c8e6;padding:64px 0 32px}
.foot-grid{display:grid;grid-template-columns:1.4fr 1fr 1fr 1fr;gap:40px;margin-bottom:48px}
footer img.flogo{width:170px;max-width:60%;height:auto;margin-bottom:18px}
.foot-grid p{font-size:.94rem;max-width:30ch}
footer h4{font-family:var(--font-display);color:#fff;font-size:.8rem;letter-spacing:.12em;text-transform:uppercase;margin-bottom:18px}
footer ul{list-style:none;display:flex;flex-direction:column;gap:11px}
footer ul a{font-size:.94rem;transition:color .15s}
footer ul a:hover{color:var(--cyan)}
.foot-bot{border-top:1px solid rgba(255,255,255,.1);padding-top:26px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:1rem;font-size:.86rem}

/* reveal animation */
.reveal{opacity:0;transform:translateY(22px);transition:opacity .7s ease,transform .7s ease}
.reveal.in{opacity:1;transform:none}

/* responsive */
@media(max-width:960px){
  .hero-grid,.why-grid{grid-template-columns:1fr;gap:44px}
  .sol-grid,.tgrid,.work-grid{grid-template-columns:1fr 1fr}
  .steps{grid-template-columns:1fr;gap:36px}
  .thread{display:none}
  .pkgs{grid-template-columns:1fr;max-width:460px;margin:0 auto}
  .foot-grid{grid-template-columns:1fr 1fr}
}
@media(max-width:680px){
  .nav{gap:.55rem}
  .nav-cta{gap:.45rem}
  .nav-cta .btn-primary{padding:.58rem .9rem;font-size:.86rem}
  .nav-links{display:none}
  .menu-btn{display:block}
  header.nav-open .nav-links{display:flex;position:absolute;top:100%;left:0;right:0;flex-direction:column;align-items:flex-start;background:#fff;border-bottom:1px solid var(--line);padding:16px 24px 20px;gap:1.05rem;box-shadow:0 20px 30px -18px rgba(5,25,65,.45)}
  header.nav-open .nav-links a{font-size:1.06rem;color:var(--ink);font-weight:600}
  .sol-grid,.tgrid,.work-grid{grid-template-columns:1fr}
  .work-fig img{aspect-ratio:3/2}
  .section{padding:72px 0}
  .hero{padding:54px 0 70px}
  .cta{padding:44px 22px;border-radius:22px}
  .wrap{padding:0 18px}
  .section-head{margin-bottom:38px}
  .why-card{padding:30px 24px}
  .control{padding:18px}
  .strip-inner{gap:12px 22px;padding:20px 0}
  .foot-grid{gap:28px 24px}
  .foot-grid{grid-template-columns:1fr 1fr}
}
@media(max-width:460px){
  .wrap{padding:0 16px}
  .hero-copy h1{font-size:clamp(2rem,8.6vw,2.55rem)}
  .hero-copy h1 .city-name{font-size:clamp(1.9rem,8vw,2.55rem)}
  .hero-copy p.lead{font-size:1.05rem}
  .section{padding:54px 0}
  .section-head h2{font-size:1.58rem}
  .cta{padding:40px 20px}
  .cta h2{font-size:1.55rem}
  .cta p{font-size:1rem}
  .why-card{padding:26px 20px}
  .why-card .stat{font-size:2.6rem}
  .pkg{padding:28px 22px}
  .pkg .price{font-size:2.1rem}
  .strip-inner span.lbl{width:100%;text-align:center;margin:0 0 4px}
  .foot-grid{grid-template-columns:1fr 1fr;gap:24px 20px}
  .foot-bot{flex-direction:column;align-items:flex-start;gap:.45rem}
}
@media(prefers-reduced-motion:reduce){
  *{animation:none!important;transition:none!important}
  .reveal{opacity:1;transform:none}
  html{scroll-behavior:auto}
}
:focus-visible{outline:3px solid var(--cyan);outline-offset:2px;border-radius:6px}

/* ---- consult lead form ---- */
.lead-card{background:var(--white);border:1px solid var(--line);border-radius:24px;padding:30px;box-shadow:var(--shadow);position:relative}
.lead-card h3{font-size:1.3rem;margin-bottom:.3rem}
.lead-card .sub{color:var(--slate);font-size:.95rem;margin-bottom:22px}
.field{margin-bottom:14px}
.field label{display:block;font-size:.8rem;font-weight:600;color:var(--ink);margin-bottom:6px}
.field input{width:100%;padding:.9rem 1rem;border:1.5px solid var(--line);border-radius:12px;font:inherit;font-size:1rem;color:var(--ink);background:var(--surface);transition:border-color .15s,background .15s}
.field input:focus{outline:none;border-color:var(--cyan);background:#fff}
.lead-card form .btn{width:100%;justify-content:center;margin-top:8px}
.form-alt{text-align:center;margin-top:16px;font-size:.88rem;color:var(--slate)}
.form-alt a{color:var(--cyan-deep);font-weight:600}
.privacy{font-size:.74rem;color:var(--slate);text-align:center;margin-top:14px;line-height:1.5}
.success{display:none}
.success.show{display:block;text-align:center;padding:14px 0}
.success .check{width:64px;height:64px;border-radius:50%;background:var(--cyan);display:grid;place-items:center;margin:0 auto 18px}
.success .check svg{width:32px;height:32px;color:var(--ink)}
.success h3{margin-bottom:.5rem}
.success p{color:var(--slate);margin-bottom:20px}
.consent{display:flex;gap:.55rem;align-items:flex-start;font-size:.76rem;color:var(--slate);line-height:1.5;margin:2px 0 4px;text-align:left}
.consent input{margin-top:.18rem;width:16px;height:16px;flex-shrink:0;accent-color:var(--cyan);cursor:pointer}
.consent a{color:var(--cyan-deep);font-weight:600}
/* --- call CTA + mobile sticky bar (B2) --- */
.nav-call{display:inline-flex;align-items:center;gap:.4rem;font-family:var(--font-display);font-weight:700;font-size:.95rem;color:var(--ink);white-space:nowrap}
.nav-call:hover{color:var(--cyan-deep)}
.nav-call svg{width:17px;height:17px;stroke:var(--cyan-deep);flex-shrink:0}
.nav-call .nav-call-lbl{display:none}
.mobile-cta-bar{display:none}
@media(max-width:680px){
  .nav-call .nav-call-num{display:none}
